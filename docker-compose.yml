services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flovart
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flovart"]
      interval: 5s
      timeout: 3s
      retries: 10

  hub:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/flovart?sslmode=disable"
      JWT_SECRET: "flovart-dev-secret-change-in-production"
      JWT_EXP_HOURS: "168"
      CORS_ALLOW: "*"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  enterprise:
    build: ./backend/enterprise
    environment:
      ENTERPRISE_PORT: "8081"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/flovart?sslmode=disable"
      JWT_SECRET: "flovart-dev-secret-change-in-production"
      CORS_ALLOW: "*"
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    ports:
      - "3217:3217"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - hub
      - enterprise

volumes:
  db-data:
