# Flovart - Tauri 桌面应用全平台构建 + 自动发布
#
# 触发条件：
#   1. 推送到 main          → 出 Prerelease  (nightly 频道)
#   2. 推送 v* tag         → 出正式 Release  (stable 频道)
#   3. workflow_dispatch   → 手动触发，默认 Prerelease
#
# 构建矩阵：Windows x64 / macOS (Apple Silicon + Intel) / Linux x64
#
# 必须在 GitHub Repo Settings → Secrets 中配置：
#   TAURI_SIGNING_PRIVATE_KEY         - 自动更新签名私钥（src-tauri/.tauri_private_key 文件内容）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - 私钥密码（生成时无密码则留空）
#
# 包含组件：
#   - Flovart 主程序（React 19 + Tauri 2）
#   - flovart-host 启动器（Chrome / Edge Native Messaging 宿主，源在 src/bin/host.rs）
#   - 平台原生安装包（Windows: NSIS .exe / .msi，macOS: .dmg，Linux: .deb / .AppImage）
#
# Sidecar 编译：
#   src-tauri/binaries/ 已在 .gitignore 排除（只有 Windows binary 会破坏跨平台构建），
#   每个 job 在 tauri build 之前会从 src/bin/host.rs 编译对应 target 的 sidecar。

name: Build Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: '标记为 Prerelease（nightly 频道）'
        type: boolean
        default: true

permissions:
  contents: write

# 串行跑同一组的 job，避免 prerelease 标签 race condition
concurrency:
  group: 'desktop-build'
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            binary_name: flovart-host.exe
            sidecar_ext: .exe
            installer_glob: |
              **/*.exe
              **/*.msi
            label: Windows x64
          # macOS runner 是 10x minutes multiplier（极费配额），
          # 暂时只跑 Windows + Linux。macOS 在本地 / 推 tag 时手跑。
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            binary_name: flovart-host
            sidecar_ext: ''
            installer_glob: |
              **/*.deb
              **/*.AppImage
            label: Linux x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux 桌面环境依赖 ──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── Node + Rust 工具链 ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.rust_target }}

      - name: Install npm dependencies
        run: npm ci

      # ── Sidecar pre-build ──
      # 从 src/bin/host.rs 编译 flovart-host（Chrome Native Messaging 宿主），
      # 放到 src-tauri/binaries/，文件名带 target triple 后缀，供 Tauri externalBin 查找。
      - name: Build sidecar flovart-host
        working-directory: src-tauri
        shell: bash
        run: |
          cargo build --bin flovart-host --target ${{ matrix.rust_target }} --release
          mkdir -p binaries
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" \
             "binaries/flovart-host-${{ matrix.rust_target }}${{ matrix.sidecar_ext }}"
          echo "=== Sidecar ready ==="
          ls -la binaries/
          file binaries/* 2>/dev/null || true

      # ── Tauri build + 自动签名 + 创建 release ──
      # prerelease 表达式：push 到 main 分支 → nightly；tag → stable；手动触发 → 按 input。
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            {
              echo "is_tag=true"
              echo "tag_name=${GITHUB_REF_NAME}"
              echo "release_name=Flovart v__VERSION__"
              echo "release_body<<EOF"
              echo "## Flovart Stable Release"
              echo ""
              echo "- Flovart main app + flovart-host launcher"
              echo "- All-platform installers (Win/macOS/Linux)"
              echo "EOF"
              echo "prerelease=false"
              echo "updater=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "is_tag=false"
              echo "tag_name=nightly-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
              echo "release_name=Flovart Nightly v__VERSION__ (build #${GITHUB_RUN_NUMBER})"
              echo "release_body<<EOF"
              echo "## Flovart Nightly Build"
              echo ""
              echo "- Flovart main app + flovart-host launcher"
              echo "- Windows + Linux installers (macOS disabled in CI for quota)"
              echo "- This is a pre-release, may be unstable"
              echo "EOF"
              echo "prerelease=true"
              echo "updater=false"
            } >> "$GITHUB_OUTPUT"
          fi
          echo "=== GITHUB_OUTPUT ==="
          cat "$GITHUB_OUTPUT"

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.meta.outputs.tag_name }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseBody: ${{ steps.meta.outputs.release_body }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          includeUpdaterJson: ${{ steps.meta.outputs.updater }}
          args: --target ${{ matrix.rust_target }}
