# Flovart - Tauri 全平台桌面应用构建
#
# 触发条件：
#   push 到 main / claude-code-integration → 构建并上传 artifacts（EXE / DMG / deb / AppImage）
#   push v* tag → 构建 artifacts + 创建 GitHub Draft Release
#
# 必须在 GitHub Repo Settings → Secrets 中配置：
#   TAURI_SIGNING_PRIVATE_KEY - 自动更新签名私钥
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - 私钥密码（无密码则留空）

name: Build & Release Desktop App

on:
  push:
    branches:
      - main
      - claude-code-integration
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundleExt: msi
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundleExt: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundleExt: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundleExt: deb

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      # ── Branch / workflow_dispatch: 仅构建 + 上传 artifacts ──
      - name: Build Tauri (branch)
        if: startsWith(github.ref, 'refs/heads/') || github.event_name == 'workflow_dispatch'
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundleExt }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts (branch)
        if: startsWith(github.ref, 'refs/heads/') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flovart-${{ matrix.platform }}-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/

      # ── Tag: 构建 + 创建 Draft Release ──
      - name: Build & Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Flovart v__VERSION__'
          releaseBody: |
            See the assets below to download and install this version.

            **Windows**: Download `.msi`
            **macOS**: Download `.dmg`
            **Linux**: Download `.deb` or `.AppImage`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
